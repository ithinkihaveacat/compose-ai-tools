name: Publish snapshot

# Publish a -SNAPSHOT build to the Maven Central snapshots repo
# (https://central.sonatype.com/repository/maven-snapshots/) on every push to
# main. The vanniktech plugin routes `-SNAPSHOT` versions to that URL
# automatically; snapshots are unsigned.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      suffix:
        description: >-
          Optional version suffix inserted before -SNAPSHOT. Leave blank to use
          the plain next-patch snapshot on main, or a ref+SHA suffix on branches.
        required: false
        type: string

concurrency:
  group: snapshot-${{ github.ref }}-${{ inputs.suffix || 'auto' }}
  cancel-in-progress: true

# Snapshot publish only reads repo contents; auth for Central is via
# env-based credentials, not GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  publish-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need tags to compute the next snapshot version.
          fetch-depth: 0
          persist-credentials: false
      - id: version
        name: Compute snapshot version
        # Take the latest `v*` tag, strip leading `v`, bump the patch digit,
        # append `-SNAPSHOT`. Main keeps the stable next-patch coordinate
        # documented for downstream consumers. Manual runs on branches get a
        # ref+SHA suffix by default so PR snapshots can be tested without
        # overwriting the main snapshot coordinate.
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_SUFFIX: ${{ inputs.suffix || '' }}
        run: |
          last_tag="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo v0.0.0)"
          base="${last_tag#v}"
          major="${base%%.*}"
          rest="${base#*.}"
          minor="${rest%%.*}"
          patch="${rest#*.}"
          patch="${patch%%-*}"                    # drop any pre-release suffix
          next_base="${major}.${minor}.$((patch + 1))"

          suffix="$INPUT_SUFFIX"
          if [[ -z "$suffix" && "$REF_NAME" != "main" ]]; then
            suffix="${REF_NAME}-${GITHUB_SHA::7}"
          fi
          if [[ -n "$suffix" ]]; then
            suffix="$(
              printf '%s' "$suffix" |
                tr '[:upper:]' '[:lower:]' |
                sed -E 's/[^a-z0-9.-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g'
            )"
            if [[ -z "$suffix" ]]; then
              echo "Snapshot suffix resolved to empty after sanitization." >&2
              exit 1
            fi
            next="${next_base}-${suffix}-SNAPSHOT"
          else
            next="${next_base}-SNAPSHOT"
          fi

          echo "Last tag: $last_tag -> snapshot version: $next"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "### Maven snapshot" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$next\`" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/setup
      - name: Publish -SNAPSHOT to Maven Central snapshots
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.version }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          ./gradlew \
            :gradle-plugin:publishToMavenCentral \
            :data-a11y-core:publishToMavenCentral \
            :data-a11y-connector:publishToMavenCentral \
            :data-fonts-core:publishToMavenCentral \
            :data-fonts-connector:publishToMavenCentral \
            :data-history-connector:publishToMavenCentral \
            :data-layoutinspector-core:publishToMavenCentral \
            :data-layoutinspector-connector:publishToMavenCentral \
            :data-recomposition-connector:publishToMavenCentral \
            :data-render-compose:publishToMavenCentral \
            :data-render-core:publishToMavenCentral \
            :data-render-connector:publishToMavenCentral \
            :data-resources-core:publishToMavenCentral \
            :data-resources-connector:publishToMavenCentral \
            :data-scroll-core:publishToMavenCentral \
            :data-strings-core:publishToMavenCentral \
            :data-strings-connector:publishToMavenCentral \
            :data-theme-connector:publishToMavenCentral \
            :renderer-android:publishToMavenCentral \
            :preview-annotations:publishToMavenCentral \
            :daemon:core:publishToMavenCentral \
            :daemon:desktop:publishToMavenCentral \
            :daemon:android:publishToMavenCentral
          # Note: `--no-configuration-cache` is incompatible with
          # `org.gradle.unsafe.isolated-projects=true` set in gradle.properties
          # (Gradle fails with "Configuration Cache cannot be disabled when
          # Isolated Projects is enabled"). Vanniktech's publish tasks work
          # with config-cache, so just let it run normally.
