name: zizmor

# Static analysis for GitHub Actions workflows. Catches common-but-dangerous
# patterns: expression injection via PR titles / branch names, over-permissive
# `pull_request_target` usage, unpinned third-party actions, missing or
# excessive `permissions:` blocks, self-hosted-runner misconfiguration, etc.
#
# PRs run deterministic/offline checks only when GitHub Actions files change,
# without SARIF upload or other GitHub API calls that can rate-limit the
# critical path. Online audits and Security tab uploads run only on a schedule
# or by manual dispatch.

on:
  pull_request:
    paths:
      - '.github/**'
  schedule:
    - cron: '17 5 * * 2'
  workflow_dispatch:

permissions:
  contents: read
  # Required so the action can upload SARIF to code scanning.
  security-events: write
  # Required by zizmor to fetch metadata about referenced actions.
  actions: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run offline PR audit
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          online-audits: false
          advanced-security: false
          token: ''

      - name: Run scheduled online audit
        if: github.event_name != 'pull_request'
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          online-audits: true
          advanced-security: true
