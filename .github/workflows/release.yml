name: Release

# Builds and publishes the CLI, MCP server, VS Code extension, skills, and
# Gradle plugin + renderer-android for a given tag. Uploads the CLI / MCP /
# VSIX / skill assets onto the GitHub Release (creating it if it doesn't
# exist yet). Maven coordinates ship to Maven Central only — we do not
# mirror to GitHub Packages, since Central is the supported consumer path.
#
# Entry points:
#   - workflow_call: called from release-please.yml after release-please
#     merges the release PR and creates the tag + Release. Primary path.
#   - workflow_dispatch: re-run the release build for an existing tag (e.g.
#     after a transient publish failure).
#   - push: tags (v*): escape hatch for manually-pushed tags.
#
# All three paths resolve to `TAG_NAME`, so downstream jobs don't care which
# fired. See docs/RELEASING.md.
on:
  workflow_call:
    inputs:
      tag:
        description: 'Tag name to release (e.g. v0.3.5).'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)release, e.g. v0.3.5. Must already exist.'
        required: true
        type: string
  push:
    tags:
      - 'v*'

# Workflow-level default is read-only. Each job widens only what it needs:
# - release: contents: write (creates/updates the GitHub Release, uploads assets)
permissions:
  contents: read

# Both tag-push and workflow_call/dispatch for the same tag serialize through
# the same concurrency group, so a re-run can't race a fresh release.
concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

# Every job consumes TAG_NAME (never GITHUB_REF_NAME) so the steps work the
# same whether triggered by tag push or by workflow_call/dispatch. Templated
# once here; scripts read it via `$TAG_NAME` from the env, which keeps tag
# content out of shell arg positions.
env:
  TAG_NAME: ${{ inputs.tag || github.ref_name }}

jobs:
  # Run gradle publish AFTER the other builds succeed so we don't orphan a
  # published Maven Central artifact if the VSIX, CLI, MCP, or skill build
  # fails — Central refuses to overwrite an already-published release
  # version, so a half-released version can't be quietly rebuilt. Gating
  # on `build-skills` here also serves as the coordination point for the
  # `release` job: `release` only `needs` this job, so adding a builder
  # here transitively guarantees its artifacts are uploaded before
  # `release` downloads them.
  # `renderer-android` is published alongside the plugin so external consumers
  # that apply the plugin via Maven Central also get the Robolectric-based
  # Android renderer AAR — the plugin resolves it via matching version.
  # `preview-annotations` ships the `@ScrollingPreview` marker that Compose
  # apps add to their compileOnly classpath, so it must publish in lockstep.
  # `daemon-core` / `daemon-desktop` / `daemon-android` are pre-1.0 — published
  # alongside so embedders (Gradle plugin, future Maven/IntelliJ plugins,
  # third-party tooling) can consume the daemon by coordinate. See
  # docs/daemon/DESIGN.md § 17 for the publishing decision and § 19 for the
  # captureToImage fallback if Roborazzi's API ever does break binary compat.
  publish-gradle-plugin:
    needs: [build-applications, build-skills, build-vscode-extension]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.TAG_NAME }}
          persist-credentials: false
      - name: Derive plugin version from tag
        # Strip leading `v` from TAG_NAME, e.g. v0.1.0 → 0.1.0. $PLUGIN_VERSION
        # is inherited by every subsequent step in this job.
        run: echo "PLUGIN_VERSION=${TAG_NAME#v}" >> "$GITHUB_ENV"
      - uses: ./.github/actions/setup
        with:
          cache-read-only: 'true'
      - name: Publish plugin, renderer-android, data-*, preview-annotations, daemon-* to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          # See the comment in snapshot.yml's publish step: root-level abbreviation fans out
          # to every subproject applying `composeai.maven-publishing`; `:gradle-plugin` is an
          # includeBuild and needs an explicit address.
          ./gradlew \
            :gradle-plugin:publishAndReleaseToMavenCentral \
            publishAndReleaseToMavenCentral

  # Build the runnable applications shipped on each GitHub Release: the CLI
  # (`compose-preview-*`) and the standalone MCP server (`compose-preview-mcp-*`).
  # The CLI tarball already implementation-bundles `:mcp`, so the standalone
  # MCP archive is for consumers who only want `compose-preview-mcp` on its
  # own (e.g. wiring it into an MCP client without dragging the CLI in).
  #
  # Each dist is uploaded as its own artifact so `actions/upload-artifact`'s
  # lowest-common-ancestor logic collapses to the single `*/build/distributions/`
  # dir, leaving the artifact contents flat. A previous attempt that listed
  # both `cli/build/distributions/...` and `mcp/build/distributions/...` under
  # one artifact pushed the LCA back to the workspace root, so the files
  # landed nested inside the artifact and silently fell off the shallow
  # upload glob in the `release` job (zero assets shipped on v0.10.2–v0.10.5).
  build-applications:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.TAG_NAME }}
          persist-credentials: false
      - name: Derive plugin version from tag
        run: echo "PLUGIN_VERSION=${TAG_NAME#v}" >> "$GITHUB_ENV"
      - uses: ./.github/actions/setup
        with:
          cache-read-only: 'true'
      - name: Build CLI and MCP distributions
        run: ./gradlew :cli:distZip :cli:distTar :mcp:distZip :mcp:distTar
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-dist
          path: |
            cli/build/distributions/compose-preview-*.zip
            cli/build/distributions/compose-preview-*.tar.gz
          retention-days: 1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcp-dist
          path: |
            mcp/build/distributions/compose-preview-mcp-*.zip
            mcp/build/distributions/compose-preview-mcp-*.tar.gz
          retention-days: 1

  # Pack each `skills/<name>/` directory into its own `<name>-skill-<ver>.tar.gz`
  # release asset so `scripts/install.sh` can drop it into ~/.claude/skills/<name>/.
  # Iterates over every skill dir so adding a new skill needs no workflow edit.
  build-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.TAG_NAME }}
          persist-credentials: false
      - name: Pack skill bundles
        run: |
          ver="${TAG_NAME#v}"
          mkdir -p dist
          for skill_dir in skills/*/; do
            name=$(basename "$skill_dir")
            [[ -f "$skill_dir/SKILL.md" ]] || continue
            tar -czf "dist/${name}-skill-${ver}.tar.gz" -C "$skill_dir" .
            echo "packed ${name}-skill-${ver}.tar.gz"
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: skill-dist
          path: dist/*-skill-*.tar.gz
          retention-days: 1

  build-vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.TAG_NAME }}
          persist-credentials: false
      # Do not cache `npm` here: release builds produce artifacts that get
      # published, and a poisoned cache from an unrelated branch/run could
      # influence the installed dependency tree (zizmor: cache-poisoning).
      # `npm ci` on a clean runner is fast enough for a once-per-release job.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci
      - name: Set version
        working-directory: vscode-extension
        # Read tag from $TAG_NAME (from env, not templated into the script) so
        # the tag name — attacker-influenceable through git or the dispatch
        # input — can't inject arguments into `npm version`.
        run: npm version --no-git-tag-version --allow-same-version "${TAG_NAME#v}"
      - name: Build VSIX
        working-directory: vscode-extension
        run: npm run package
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vscode-extension
          path: vscode-extension/*.vsix
          retention-days: 1

  # Publish the prebuilt VSIX to both marketplaces. Runs alongside the
  # `release` job (not gating it) so a marketplace outage can't block the
  # `.vsix` landing on the GitHub Release. On workflow_dispatch re-runs for
  # an existing tag, "version already published" is treated as success so
  # reruns are idempotent. Secrets (VSCE_PAT, OVSX_PAT) are scoped per-step.
  publish-vscode-extension:
    needs: build-vscode-extension
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vscode-extension
          path: dist
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - name: Publish to VS Code Marketplace
        env:
          # vsce reads VSCE_PAT from env — keeps the token out of argv/logs.
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -o pipefail
          vsix=$(ls dist/*.vsix)
          echo "Publishing $vsix to VS Code Marketplace"
          if ! output=$(npx --yes @vscode/vsce@^3 publish --packagePath "$vsix" 2>&1); then
            printf '%s\n' "$output"
            if printf '%s' "$output" | grep -qiE "already.*published|already exists"; then
              echo "Version already on VS Code Marketplace — treating as success."
              exit 0
            fi
            exit 1
          fi
          printf '%s\n' "$output"
      - name: Publish to Open VSX
        # Run even if the Marketplace step failed — the two registries are
        # independent, so a PAT/outage on one shouldn't block the other.
        if: ${{ !cancelled() }}
        env:
          # ovsx reads OVSX_PAT from env.
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          set -o pipefail
          vsix=$(ls dist/*.vsix)
          echo "Publishing $vsix to Open VSX"
          if ! output=$(npx --yes ovsx@^0.10 publish "$vsix" 2>&1); then
            printf '%s\n' "$output"
            if printf '%s' "$output" | grep -qiE "already.*published|already exists"; then
              echo "Version already on Open VSX — treating as success."
              exit 0
            fi
            exit 1
          fi
          printf '%s\n' "$output"

  release:
    needs: publish-gradle-plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write   # update the release, upload assets
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: Upload or create GitHub Release
        # Each upstream upload-artifact step has a single common parent
        # directory in its `path:` list, so its LCA collapses to that dir and
        # the artifact contents are flat. After `merge-multiple: true`, every
        # CLI / MCP / skill / VSIX file lands directly under `artifacts/`, so
        # the shallow glob below is sufficient. If you ever expand the dist
        # set across two parents within a single artifact, switch back to a
        # `find artifacts -type f …` collector first.
        #
        # $TAG_NAME is read from env (not templated into the script), so the
        # tag name — attacker-influenceable through git or the dispatch input
        # — can't break out of the quotation and inject extra args.
        #
        # Idempotent: release-please has usually already created the Release
        # (with the CHANGELOG entry as the body) by the time this runs, so we
        # just upload assets onto it. Falls back to creating the Release for
        # tag-push / workflow_dispatch paths where it may not exist yet.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME exists — uploading assets."
            gh release upload "$TAG_NAME" \
              --clobber \
              artifacts/*.zip \
              artifacts/*.tar.gz \
              artifacts/*.vsix
          else
            echo "Release $TAG_NAME does not exist — creating."
            gh release create "$TAG_NAME" \
              --title "compose-ai-tools ${TAG_NAME#v}" \
              --generate-notes \
              artifacts/*.zip \
              artifacts/*.tar.gz \
              artifacts/*.vsix
          fi
